{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="text-center mb-4">
            <h1 class="display-6 fw-bold text-primary" data-i18n="app.title">日益找房</h1>
            <p class="text-muted" data-i18n="app.subtitle">从SUUMO抓取房产信息，浏览、翻译、导出</p>
        </div>

        <!-- Tabs: Manual / Search / Favorites -->
        <ul class="nav nav-pills nav-fill mb-3" id="inputTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="manual-tab" data-bs-toggle="tab" data-bs-target="#manual" type="button">
                    <i class="bi bi-link-45deg"></i> <span data-i18n="tab.manual">URL输入</span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="search-tab" data-bs-toggle="tab" data-bs-target="#searchPane" type="button">
                    <i class="bi bi-geo-alt"></i> <span data-i18n="tab.search">搜索页批量</span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="favorites-tab" data-bs-toggle="tab" data-bs-target="#favorites" type="button">
                    <i class="bi bi-heart"></i> <span data-i18n="tab.favorites">收藏夹</span>
                </button>
            </li>
        </ul>

        <div class="tab-content" id="inputTabsContent">
            <!-- Manual URL input -->
            <div class="tab-pane fade show active" id="manual" role="tabpanel">
                <textarea class="form-control mb-2" id="urlInput" rows="4"
                    placeholder="每行输入一个SUUMO物件URL&#10;https://suumo.jp/chintai/jnc_.../?bc=...&#10;https://suumo.jp/ms/..."></textarea>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <small class="text-muted" id="urlCount">0 URL</small>
                    <div class="d-flex gap-2 align-items-center">
                        <label class="text-muted small mb-0" data-i18n="options.delay">间隔(秒)</label>
                        <input type="number" class="form-control form-control-sm" id="delayInput" value="2" min="1" max="10" style="width:65px;">
                        <button class="btn btn-sm btn-outline-secondary" id="clearUrls">
                            <i class="bi bi-x-circle"></i>
                        </button>
                    </div>
                </div>
                <button class="btn btn-primary w-100 btn-lg" id="startScrapeBtn">
                    <i class="bi bi-play-fill"></i> <span data-i18n="action.start">开始爬取</span>
                </button>
            </div>

            <!-- Search batch -->
            <div class="tab-pane fade" id="searchPane" role="tabpanel">
                <input type="text" class="form-control mb-2" id="searchUrlInput"
                    placeholder="粘贴SUUMO搜索结果页URL  https://suumo.jp/jj/chintai/ichiran/...">
                <div class="row g-2 mb-3">
                    <div class="col">
                        <div class="input-group input-group-sm">
                            <span class="input-group-text" data-i18n="search.maxResults">最大条数</span>
                            <input type="number" class="form-control" id="maxResultsInput" value="100" min="1" max="1000">
                        </div>
                    </div>
                    <div class="col">
                        <div class="input-group input-group-sm">
                            <span class="input-group-text" data-i18n="options.delay">间隔(秒)</span>
                            <input type="number" class="form-control" id="searchDelayInput" value="2" min="1" max="10">
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary w-100 btn-lg" id="startSearchScrapeBtn">
                    <i class="bi bi-play-fill"></i> <span data-i18n="search.start">开始批量爬取</span>
                </button>
            </div>

            <!-- Favorites -->
            <div class="tab-pane fade" id="favorites" role="tabpanel">
                <div class="row g-2 mb-2">
                    <div class="col">
                        <input type="email" class="form-control" id="email" placeholder="SUUMO email">
                    </div>
                    <div class="col">
                        <input type="password" class="form-control" id="password" placeholder="Password">
                    </div>
                </div>
                <div class="d-flex gap-2 mb-2">
                    <button class="btn btn-outline-primary flex-fill" id="getFavoritesBtn">
                        <i class="bi bi-heart-fill"></i> <span data-i18n="login.getFavorites">获取收藏夹</span>
                    </button>
                    <button class="btn btn-primary flex-fill" id="getFavoritesAndScrapeBtn">
                        <i class="bi bi-play-fill"></i> <span data-i18n="login.getAndScrape">获取并爬取</span>
                    </button>
                </div>
                <div id="favoritesStatus"></div>
            </div>
        </div>

        <!-- Progress (hidden by default) -->
        <div class="card mt-4 d-none" id="progressCard">
            <div class="card-body">
                <div class="d-flex align-items-center mb-2">
                    <div class="spinner-border spinner-border-sm text-primary me-2" id="progressSpinner"></div>
                    <span id="progressText" data-i18n="progress.preparing">准备中...</span>
                </div>
                <div class="progress" style="height: 20px;">
                    <div class="progress-bar progress-bar-striped progress-bar-animated" id="progressBar" style="width: 0%;">0%</div>
                </div>
                <small class="text-muted mt-1 d-block" id="currentUrl"></small>
            </div>
        </div>

        <!-- Batch started notification -->
        <div class="alert alert-success mt-3 d-none" id="batchStartedCard">
            <i class="bi bi-rocket-takeoff"></i> <strong>后台任务已启动！</strong>
            <span id="batchStartedText"></span>
            <a id="batchStartedLink" href="/results" class="alert-link ms-1">前往任务列表查看进度 →</a>
        </div>

        <!-- Error (hidden by default) -->
        <div class="alert alert-danger mt-3 d-none" id="errorCard">
            <i class="bi bi-exclamation-triangle"></i> <span id="errorText"></span>
            <ul id="errorList" class="mb-0 mt-1 small"></ul>
        </div>
    </div>
</div>

<!-- ═══ Inline results section (full width, shown after manual scrape completes) ═══ -->
<div class="d-none mt-4" id="inlineResults">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0"><i class="bi bi-check-circle text-success"></i> <span id="inlineResultTitle">爬取完成</span></h4>
        <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-primary" id="inlineExportExcel"><i class="bi bi-file-earmark-spreadsheet"></i> Excel</button>
            <button class="btn btn-outline-primary" id="inlineExportCsv"><i class="bi bi-filetype-csv"></i> CSV</button>
            <button class="btn btn-outline-primary" id="inlineExportJson"><i class="bi bi-filetype-json"></i> JSON</button>
            <a class="btn btn-outline-secondary" id="inlineGoResults" href="/results"><i class="bi bi-clock-history"></i> 历史</a>
        </div>
    </div>
    <div id="inlinePropertyCards"></div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/currency.js') }}"></script>
<script src="{{ url_for('static', filename='js/bilingual.js') }}"></script>
<script>
    let currentTaskId = null;
    let eventSource = null;
    let scrapeMode = 'manual'; // 'manual' | 'search'

    const urlInput = document.getElementById('urlInput');
    const urlCount = document.getElementById('urlCount');
    const startScrapeBtn = document.getElementById('startScrapeBtn');
    const progressCard = document.getElementById('progressCard');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const currentUrlEl = document.getElementById('currentUrl');
    const errorCard = document.getElementById('errorCard');
    const errorText = document.getElementById('errorText');
    const errorList = document.getElementById('errorList');

    // URL count
    urlInput.addEventListener('input', updateUrlCount);
    function updateUrlCount() {
        const n = urlInput.value.split('\n').filter(u => u.trim()).length;
        urlCount.textContent = `${n} URL`;
    }
    document.getElementById('clearUrls').addEventListener('click', () => { urlInput.value = ''; updateUrlCount(); });

    // ── Manual scrape ──
    startScrapeBtn.addEventListener('click', async () => {
        const urls = urlInput.value.split('\n').map(u => u.trim()).filter(Boolean);
        const delay = parseInt(document.getElementById('delayInput').value) || 2;
        if (!urls.length) { alert(i18n.t('error.noUrl')); return; }

        scrapeMode = 'manual';
        beginProgress();
        try {
            const res = await fetch('/api/scrape', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ urls, delay })
            });
            const data = await res.json();
            if (res.ok) { currentTaskId = data.task_id; connectSSE(data.task_id); }
            else { showError(data.error || 'Failed'); }
        } catch (e) { showError(i18n.t('error.network')); }
    });

    // ── Search batch scrape (fire-and-forget, runs in background) ──
    document.getElementById('startSearchScrapeBtn').addEventListener('click', async () => {
        const searchUrl = document.getElementById('searchUrlInput').value.trim();
        const maxResults = parseInt(document.getElementById('maxResultsInput').value) || 100;
        const delay = parseInt(document.getElementById('searchDelayInput').value) || 2;
        if (!searchUrl) { alert('Please enter a search URL'); return; }

        const btn = document.getElementById('startSearchScrapeBtn');
        btn.disabled = true;
        try {
            const res = await fetch('/api/search/scrape', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ search_url: searchUrl, max_results: maxResults, delay })
            });
            const data = await res.json();
            if (res.ok) {
                // Show success toast — task runs in background
                showBatchStarted(data.task_id, maxResults);
            } else { showError(data.error || 'Failed'); }
        } catch (e) { showError(i18n.t('error.network')); }
        btn.disabled = false;
    });

    // ── Favorites ──
    document.getElementById('getFavoritesBtn').addEventListener('click', () => fetchFavorites(false));
    document.getElementById('getFavoritesAndScrapeBtn').addEventListener('click', () => fetchFavorites(true));

    async function fetchFavorites(autoStart) {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!email || !password) { showAlert('favoritesStatus', 'danger', i18n.t('error.emailRequired')); return; }
        showAlert('favoritesStatus', 'info', '<span class="spinner-border spinner-border-sm"></span> ...');
        try {
            const res = await fetch('/api/favorites', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (res.ok) {
                urlInput.value = data.urls.join('\n');
                updateUrlCount();
                showAlert('favoritesStatus', 'success', `${data.count} URLs`);
                document.getElementById('manual-tab').click();
                if (autoStart && data.urls.length) setTimeout(() => startScrapeBtn.click(), 300);
            } else { showAlert('favoritesStatus', 'danger', data.error || 'Error'); }
        } catch (e) { showAlert('favoritesStatus', 'danger', i18n.t('error.network')); }
    }

    // ── SSE + Progress ──
    function beginProgress() {
        startScrapeBtn.disabled = true;
        document.getElementById('startSearchScrapeBtn').disabled = true;
        progressCard.classList.remove('d-none');
        errorCard.classList.add('d-none');
        document.getElementById('inlineResults').classList.add('d-none');
        progressBar.style.width = '0%';
        progressBar.textContent = '0%';
        progressText.textContent = i18n.t('progress.preparing');
        currentUrlEl.textContent = '';
    }

    function connectSSE(taskId) {
        if (eventSource) eventSource.close();
        eventSource = new EventSource(`/api/scrape/stream/${taskId}`);
        eventSource.onmessage = (event) => {
            const d = JSON.parse(event.data);
            if (d.type === 'progress') {
                updateProgress(d);
                if (d.status === 'completed') { eventSource.close(); onComplete(); }
                else if (d.status === 'error') { eventSource.close(); showError('Scraping failed'); }
            } else if (d.type === 'error') { eventSource.close(); showError(d.message); }
        };
        eventSource.onerror = () => { eventSource.close(); checkFinal(taskId); };
    }

    async function checkFinal(taskId) {
        try {
            const res = await fetch(`/api/scrape/status/${taskId}`);
            const d = await res.json();
            if (d.status === 'completed') onComplete();
            else if (d.status === 'error') showError('Scraping failed');
        } catch (e) { showError(i18n.t('error.network')); }
    }

    function updateProgress(d) {
        const pct = d.total ? Math.round((d.progress / d.total) * 100) : 0;
        progressBar.style.width = `${pct}%`;
        progressBar.textContent = `${pct}%`;
        progressText.textContent = i18n.t('progress.processing', { current: d.progress, total: d.total });
        if (d.current_url) currentUrlEl.textContent = d.current_url.length > 60 ? d.current_url.substring(0, 60) + '...' : d.current_url;
        if (d.errors && d.errors.length) {
            errorCard.classList.remove('d-none');
            errorText.textContent = '';
            errorList.innerHTML = d.errors.map(e =>
                `<li>${e.url ? e.url.substring(0, 40) + '...' : ''}: ${e.error}</li>`
            ).join('');
        }
    }

    async function onComplete() {
        startScrapeBtn.disabled = false;
        document.getElementById('startSearchScrapeBtn').disabled = false;

        // Batch search → redirect to results page
        if (scrapeMode === 'search') {
            window.location.href = `/results?task=${currentTaskId}`;
            return;
        }

        // Manual scrape → show inline results
        progressCard.classList.add('d-none');
        await showInlineResults(currentTaskId);
    }

    // ── Inline Results Display ──
    async function showInlineResults(taskId) {
        try {
            const res = await fetch(`/api/properties/${taskId}/sectioned?per_page=0`);
            const data = await res.json();
            const properties = data.properties;

            if (!properties || properties.length === 0) {
                showError('No property data retrieved');
                return;
            }

            // Init currency
            if (typeof CurrencyService !== 'undefined') await CurrencyService.init();

            document.getElementById('inlineResultTitle').textContent =
                `爬取完成 - ${properties.length} 件物件`;

            // Setup export buttons
            ['Excel', 'Csv', 'Json'].forEach(fmt => {
                document.getElementById(`inlineExport${fmt}`).onclick = () =>
                    window.location.href = `/api/download/${taskId}/${fmt.toLowerCase()}`;
            });

            document.getElementById('inlineGoResults').href = `/results?task=${taskId}`;

            // Build property cards
            const container = document.getElementById('inlinePropertyCards');
            container.innerHTML = properties.map((p, idx) => buildPropertyCard(p, idx)).join('');

            document.getElementById('inlineResults').classList.remove('d-none');
            attachAiHandlers(container);
            bindOriginalTextToggles(container);

            // Smooth scroll to results
            document.getElementById('inlineResults').scrollIntoView({ behavior: 'smooth', block: 'start' });

            // Attach copy handlers
            container.querySelectorAll('.copy-prop-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const i = parseInt(btn.dataset.idx);
                    copyPropertyText(properties[i]);
                    btn.innerHTML = '<i class="bi bi-check"></i> 已复制';
                    setTimeout(() => { btn.innerHTML = '<i class="bi bi-clipboard"></i> 复制'; }, 1500);
                });
            });

            // AI summary button handlers
        // Auto-translate and prefetch AI assets
        autoTranslateAll(container, properties);

        } catch (e) {
            console.error('Failed to load inline results:', e);
            showError('Failed to load results');
        }
    }

    function findField(sectionedProperty, keys = [], labels = []) {
        const sections = sectionedProperty?.sections || [];
        for (const section of sections) {
            for (const field of section.fields || []) {
                if (keys.includes(field.key) || labels.includes(field.label)) {
                    return field;
                }
            }
        }
        return null;
    }

    function getFieldValue(sectionedProperty, keys = [], labels = [], preferTranslated = false) {
        const field = findField(sectionedProperty, keys, labels);
        if (!field) return null;
        const translatedValue = field.translated_value;
        if (preferTranslated && translatedValue !== undefined && translatedValue !== null && translatedValue !== '') {
            return translatedValue;
        }
        if (field.value !== undefined && field.value !== null && field.value !== '') {
            return field.value;
        }
        if (translatedValue !== undefined && translatedValue !== null && translatedValue !== '') {
            return translatedValue;
        }
        return null;
    }

    function formatSectionValue(rawValue, field) {
        const key = field?.key || '';
        const text = key + (field?.label || '');
        if (rawValue === null || rawValue === undefined || rawValue === '') return '-';
        if (Array.isArray(rawValue)) {
            if (rawValue.length === 0) return '-';
            if (rawValue.every(item => typeof item === 'string' || typeof item === 'number')) {
                return escapeHtml(rawValue.join(' / '));
            }
            return rawValue.map(item => {
                if (typeof item === 'object' && item !== null) {
                    return escapeHtml(Object.values(item).filter(Boolean).join(' '));
                }
                return escapeHtml(String(item));
            }).join('<br>');
        }
        if (typeof rawValue === 'object') {
            return Object.entries(rawValue).map(([k, v]) => `${escapeHtml(k)}：${escapeHtml(String(v ?? '-'))}`).join('<br>');
        }
        if (isYenField(text)) return (typeof CurrencyService !== 'undefined' ? CurrencyService.format(String(rawValue)) : escapeHtml(String(rawValue)));
        if (isAreaField(text)) return fmtArea(String(rawValue));
        return escapeHtml(String(rawValue));
    }

    function formatSectionField(field) {
        const primaryValue = field?.translated_value !== undefined && field?.translated_value !== null && field?.translated_value !== ''
            ? field.translated_value
            : field?.value;
        const secondaryValue = field?.translated_value !== undefined && field?.translated_value !== null && field?.translated_value !== '' && String(field.translated_value) !== String(field.value)
            ? field.value
            : null;
        let html = `<span class="field-primary">${formatSectionValue(primaryValue, field)}</span>`;
        if (secondaryValue !== null && secondaryValue !== undefined && secondaryValue !== '') {
            html += `<div class="mt-1"><small class="text-muted d-inline-block border rounded px-2 py-1 original-text-toggle" role="button" tabindex="0" title="点击显示/隐藏日文原文">原文</small></div>`;
            html += `<div class="original-text mt-1 d-none"><small class="text-muted">${formatSectionValue(secondaryValue, field)}</small></div>`;
        }
        return html;
    }

    /**
     * Build a full property card HTML string.
     * Includes: images, key info, and customer sections.
     */
    function buildPropertyCard(p, idx) {
        const meta = p._meta || {};
        const name = getFieldValue(p, ['detail.building_name'], ['物件名'], true) || 'Property';
        const url = meta.url || '#';

        let imageHtml = '';
        const isBlueprint = (meta.url || '').startsWith('blueprint://');
        const imageUrls = meta.image_urls || [];
        if (imageUrls.length > 0) {
            imageHtml = `
                <div class="d-flex gap-2 overflow-auto pb-2 mb-3" style="max-width:100%;">
                    ${imageUrls.slice(0, 20).map((imgUrl, i) => {
                        const src = isBlueprint || imgUrl.startsWith('/') ? imgUrl : `/api/image/proxy?url=${encodeURIComponent(imgUrl)}`;
                        return `<img src="${src}"
                              class="rounded shadow-sm flex-shrink-0"
                              style="height:120px; cursor:pointer; object-fit:cover;"
                              onclick="window.open('${src}','_blank')"
                              onerror="this.style.display='none'"
                              title="Image ${i+1}" loading="lazy">`;
                    }).join('')}
                </div>
                ${meta.id && !isBlueprint ? `<a href="/api/image/zip/${meta.id}" class="btn btn-sm btn-outline-success mb-3">
                    <i class="bi bi-download"></i> 下载全部 ${imageUrls.length} 张图片 (ZIP)
                </a>` : ''}`;
        }

        const rent = getFieldValue(p, ['rent.rent', 'basic.price_jpy'], ['房租', '售价（日元）', '物件价格'], true) || '-';
        const deposit = getFieldValue(p, ['rent.deposit'], ['押金'], true) || '-';
        const keyMoney = getFieldValue(p, ['rent.key_money'], ['礼金'], true) || '-';
        const layout = getFieldValue(p, ['basic.layout_cn'], ['户型'], true) || '-';
        const area = fmtArea(String(getFieldValue(p, ['basic.area', 'basic.land_area', 'basic.building_area', 'detail.exclusive_area'], ['面积', '土地面积', '建筑面积', '专有面积'], true) || '-'));
        const accessRaw = getFieldValue(p, ['detail.access'], ['交通'], true);
        const access1 = Array.isArray(accessRaw) ? accessRaw[0] || '-' : String(accessRaw || '-');
        const location = getFieldValue(p, ['basic.address'], ['地址', '所在地'], true) || '-';

        const formatPrice = (txt) => {
            if (!txt || txt === '-' || typeof CurrencyService === 'undefined' || !CurrencyService.rate) return txt;
            return CurrencyService.format(txt);
        };

        const keyInfoHtml = `
            <div class="row g-2 mb-3">
                <div class="col-sm-4">
                    <div class="p-2 bg-primary bg-opacity-10 rounded text-center">
                        <small class="text-muted d-block">租金 / 价格</small>
                        <strong class="fs-5 text-primary">${formatPrice(rent)}</strong>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="p-2 bg-light rounded text-center">
                        <small class="text-muted d-block">户型 / 面积</small>
                        <strong>${layout} / ${area}</strong>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="p-2 bg-light rounded text-center">
                        <small class="text-muted d-block">押金 / 礼金</small>
                        <strong>${deposit} / ${keyMoney}</strong>
                    </div>
                </div>
            </div>
            <div class="mb-3">
                <small class="text-muted"><i class="bi bi-geo-alt"></i> ${String(location)}</small><br>
                <small class="text-muted"><i class="bi bi-train-front"></i> ${access1}</small>
            </div>`;

        const sectionTables = (p.sections || []).map(section => {
            const rows = (section.fields || [])
                .filter(field => field.label && !['图片', '视频', 'Vr链接'].includes(field.label))
                .map(field => `<tr><th class="text-nowrap bg-light copy-cell" style="width:160px;">${escapeHtml(field.label)}</th><td class="copy-cell">${formatSectionField(field)}</td></tr>`)
                .join('');
            if (!rows) return '';
            return `<div class="mb-3"><h6 class="border-bottom pb-1 mb-2">${escapeHtml(section.name)}</h6><table class="table table-sm table-bordered mb-0"><tbody>${rows}</tbody></table></div>`;
        }).join('');

        return `
        <div class="card mb-4 shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center">
                <div>
                    <strong>${escapeHtml(name)}</strong>
                    <a href="${escapeHtml(url)}" target="_blank" class="ms-2 small text-decoration-none">
                        <i class="bi bi-box-arrow-up-right"></i> SUUMO
                    </a>
                </div>
                <button class="btn btn-sm btn-outline-secondary copy-prop-btn" data-idx="${idx}">
                    <i class="bi bi-clipboard"></i> 复制
                </button>
            </div>
            <div class="card-body">
                ${imageHtml}
                ${keyInfoHtml}
                <!-- AI Summary results -->
                <div class="small text-muted mb-3 ai-prefetch-status" data-idx="${idx}">
                    <span class="spinner-border spinner-border-sm me-1"></span> 正在生成 3 个标题和 3 个描述...
                </div>
                <div class="d-none mb-3 ai-title-result" data-idx="${idx}">
                    <div class="d-flex align-items-start gap-2">
                        <div class="flex-grow-1 bg-warning bg-opacity-10 rounded p-2">
                            <small class="text-muted d-block mb-1"><i class="bi bi-lightbulb"></i> AI 标题</small>
                            <div class="ai-title-text user-select-all" style="cursor:pointer;"></div>
                        </div>
                        <button class="btn btn-sm btn-outline-secondary flex-shrink-0 ai-copy-title" data-idx="${idx}" title="复制"><i class="bi bi-clipboard"></i></button>
                    </div>
                </div>
                <div class="d-none mb-3 ai-summary-result" data-idx="${idx}">
                    <div class="d-flex align-items-start gap-2">
                        <div class="flex-grow-1 bg-warning bg-opacity-10 rounded p-2">
                            <small class="text-muted d-block mb-1"><i class="bi bi-file-text"></i> AI 简介</small>
                            <div class="ai-summary-text user-select-all" style="cursor:pointer;"></div>
                        </div>
                        <button class="btn btn-sm btn-outline-secondary flex-shrink-0 ai-copy-summary" data-idx="${idx}" title="复制"><i class="bi bi-clipboard"></i></button>
                    </div>
                </div>
                ${sectionTables}
            </div>
        </div>`;
    }

    // ── Bilingual display helpers ──
    // Fields that should never show translations (property name, addresses, stations, prices, etc.)
    const NO_TRANSLATE_DISPLAY = new Set([
        '物件名',
        '所在地', '住所',
        'アクセス1', 'アクセス2', 'アクセス3',
        '最寄り駅1', '最寄り駅2', '最寄り駅3',
        '駅徒歩',
        '賃料', '賃料・初期費用', '管理費・共益費', '敷金', '礼金', '保証金', '敷引・償却',
        '販売価格', '価格',
        '専有面積', '土地面積', '建物面積',
        '築年月', '築年数', '間取り', '階', '階建', '向き',
        'URL',
    ]);

    /**
     * Append Chinese translation below a formatted value if available.
     * Returns the original formattedHtml if no translation or field is in no-translate set.
     */
    function appendTranslation(key, formattedHtml, rawOriginal, translatedData) {
        if (!translatedData || NO_TRANSLATE_DISPLAY.has(key)) return formattedHtml;
        const tv = translatedData[key];
        if (!tv || String(tv) === String(rawOriginal)) return formattedHtml;
        return `${formattedHtml}<br><small class="text-success">${escapeHtml(String(tv))}</small>`;
    }

    /** Check if a field name is likely a price field */
    function isYenField(key) {
        return /賃料|管理費|敷金|礼金|保証金|償却|駐車場|価格|費|price|rent|deposit|key_money|fee|tax|cost|spend/.test(key);
    }

    /** Check if a field name is an area field */
    function isAreaField(key) {
        return /面積|㎡|m2|area/i.test(key);
    }

    /** Format m2 → m² (superscript) */
    function fmtArea(text) {
        if (!text) return '-';
        return text.replace(/m2/gi, 'm²').replace(/㎡/g, 'm²');
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function copyPropertyText(p) {
        const text = (p.sections || []).flatMap(section => {
            const header = `【${section.name}】`;
            const rows = (section.fields || []).map(field => `${field.label}: ${Array.isArray(field.value) ? field.value.join(' / ') : (field.value ?? '-')}`);
            return [header, ...rows];
        }).join('\n');
        copyToClipboard(text);
    }

    function showBatchStarted(taskId, maxResults) {
        document.getElementById('batchStartedCard').classList.remove('d-none');
        document.getElementById('batchStartedText').textContent = `最多 ${maxResults} 条，后台爬取中...`;
        document.getElementById('batchStartedLink').href = `/results?task=${taskId}`;
        errorCard.classList.add('d-none');
    }

    function reattachCardHandlers(container, properties, i) {
        const card = container.children[i];
        if (!card) return;
        const copyBtn = card.querySelector('.copy-prop-btn');
        if (copyBtn) copyBtn.addEventListener('click', () => {
            copyPropertyText(properties[i]);
            copyBtn.innerHTML = '<i class="bi bi-check"></i> 已复制';
            setTimeout(() => { copyBtn.innerHTML = '<i class="bi bi-clipboard"></i> 复制'; }, 1500);
        });
        bindOriginalTextToggles(card);
    }

    function bindOriginalTextToggles(container) {
        container.querySelectorAll('.original-text-toggle').forEach(toggle => {
            toggle.addEventListener('click', () => {
                const original = toggle.parentElement?.nextElementSibling;
                if (original) original.classList.toggle('d-none');
            });
            toggle.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    const original = toggle.parentElement?.nextElementSibling;
                    if (original) original.classList.toggle('d-none');
                }
            });
        });
    }

    function attachAiHandlers(container) {
        container.querySelectorAll('.ai-copy-title').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = btn.dataset.idx;
                const el = btn.closest('.card')?.querySelector('.ai-title-text');
                if (el) navigator.clipboard.writeText(el.textContent);
            });
        });
        container.querySelectorAll('.ai-copy-summary').forEach(btn => {
            btn.addEventListener('click', () => {
                const el = btn.closest('.card')?.querySelector('.ai-summary-text');
                if (el) navigator.clipboard.writeText(el.textContent);
            });
        });
    }

    function attachAiHandlersForCard(card) {
        card.querySelector('.ai-copy-title')?.addEventListener('click', function() {
            const el = card.querySelector('.ai-title-text');
            if (el) navigator.clipboard.writeText(el.textContent);
        });
        card.querySelector('.ai-copy-summary')?.addEventListener('click', function() {
            const el = card.querySelector('.ai-summary-text');
            if (el) navigator.clipboard.writeText(el.textContent);
        });
        bindOriginalTextToggles(card);
    }

    function renderAiItemsForCard(card, type, items) {
        const resultEl = card.querySelector(type === 'title' ? '.ai-title-result' : '.ai-summary-result');
        const textEl = card.querySelector(type === 'title' ? '.ai-title-text' : '.ai-summary-text');
        const safeItems = (Array.isArray(items) ? items : []).filter(Boolean).slice(0, 3);
        if (resultEl) resultEl.classList.toggle('d-none', safeItems.length === 0);
        if (textEl) {
            textEl.innerHTML = safeItems
                .map((item, idx) => `<div class="mb-2 p-2 border rounded bg-white"><strong>${idx + 1}.</strong> ${escapeHtml(String(item))}</div>`)
                .join('');
        }
    }

    async function prefetchCardAssets(container, properties, i) {
        const p = properties[i];
        if (!p?._meta?.id) return;
        const card = container.children[i];
        if (!card) return;
        try {
            const res = await fetch(`/api/property/${p._meta.id}/detail-assets`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ force_translate: false }),
            });
            const data = await res.json();
            if (!data.ok) throw new Error(data.error || 'Failed to preload detail assets');
            if (data.property) {
                properties[i] = data.property;
                const tmp = document.createElement('div');
                tmp.innerHTML = buildPropertyCard(properties[i], i);
                card.replaceWith(tmp.firstElementChild);
                reattachCardHandlers(container, properties, i);
                const nextCard = container.children[i];
                if (nextCard) {
                    renderAiItemsForCard(nextCard, 'title', data.title_items || []);
                    renderAiItemsForCard(nextCard, 'summary', data.summary_items || []);
                    nextCard.querySelector('.ai-prefetch-status')?.classList.add('d-none');
                }
                return;
            }
            renderAiItemsForCard(card, 'title', data.title_items || []);
            renderAiItemsForCard(card, 'summary', data.summary_items || []);
            card.querySelector('.ai-prefetch-status')?.classList.add('d-none');
        } catch (e) {
            console.error('AI prefetch error:', e);
            const status = card.querySelector('.ai-prefetch-status');
            if (status) {
                status.classList.remove('text-muted');
                status.classList.add('text-danger');
                status.innerHTML = '<i class="bi bi-exclamation-triangle me-1"></i> 自动生成失败';
            }
        }
    }

    /** Auto-translate all untranslated properties sequentially */
    async function autoTranslateAll(container, properties) {
        for (let i = 0; i < properties.length; i++) {
            const p = properties[i];
            if (p._has_translation || !p._id) continue;
            try {
                const res = await fetch(`/api/translate/property/${p._id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ force: false }),
                });
                const data = await res.json();
                if (data.ok && data.property) {
                    properties[i] = data.property;
                    const cardEl = container.children[i];
                    if (cardEl) {
                        const tmp = document.createElement('div');
                        tmp.innerHTML = buildPropertyCard(properties[i], i);
                        cardEl.replaceWith(tmp.firstElementChild);
                        reattachCardHandlers(container, properties, i);
                    }
                }
                await prefetchCardAssets(container, properties, i);
            } catch (e) {
                console.error(`Auto-translate property ${i} failed:`, e);
                // Update status badge to show failure
                const badge = container.children[i]?.querySelector('.translate-status');
                if (badge) badge.innerHTML = '<i class="bi bi-x text-danger"></i>';
            }
        }
    }

    function showError(msg) {
        startScrapeBtn.disabled = false;
        document.getElementById('startSearchScrapeBtn').disabled = false;
        progressCard.classList.add('d-none');
        errorCard.classList.remove('d-none');
        errorText.textContent = msg;
    }

    function showAlert(elId, type, msg) {
        document.getElementById(elId).innerHTML = `<div class="alert alert-${type} py-1 mb-0 small">${msg}</div>`;
    }

    updateUrlCount();
</script>
{% endblock %}
