<!DOCTYPE html>
<html lang="zh" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}日益找房 - SUUMO Digger{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid px-3 px-md-4 px-lg-5">
            <a class="navbar-brand fw-bold" href="{{ url_for('main.index') }}">
                <i class="bi bi-buildings"></i> 日益找房 <small class="opacity-75">SUUMO Digger</small>
            </a>
            <div class="d-flex align-items-center gap-2">
                <a class="btn btn-outline-light btn-sm d-none d-md-inline-flex" href="{{ url_for('main.index') }}">
                    <i class="bi bi-search"></i> <span data-i18n="nav.home"></span>
                </a>
                <a class="btn btn-outline-light btn-sm d-none d-md-inline-flex" href="{{ url_for('main.results_page') }}">
                    <i class="bi bi-table"></i> <span data-i18n="nav.results"></span>
                </a>
                <a class="btn btn-outline-light btn-sm d-none d-md-inline-flex" href="{{ url_for('main.settings_page') }}">
                    <i class="bi bi-gear"></i> <span data-i18n="nav.settings"></span>
                </a>
                <button class="btn btn-outline-light btn-sm" id="langToggle" title="Language">
                    <i class="bi bi-translate"></i> <span class="lang-label"></span>
                </button>
                <button class="btn btn-outline-light btn-sm btn-circle" id="themeToggle" title="Theme">
                    <i class="bi bi-moon-fill"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container-fluid px-3 px-md-4 px-lg-5 py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer mt-auto py-3 bg-light">
        <div class="container-fluid text-center">
            <span class="text-muted" data-i18n="app.footer">日益找房 - SUUMO Digger</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    <script>
        // Theme
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-bs-theme', savedTheme);
        updateThemeIcon(savedTheme);
        themeToggle.addEventListener('click', () => {
            const cur = html.getAttribute('data-bs-theme');
            const next = cur === 'light' ? 'dark' : 'light';
            html.setAttribute('data-bs-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        });
        function updateThemeIcon(theme) {
            themeToggle.querySelector('i').className = theme === 'light' ? 'bi bi-moon-fill' : 'bi bi-sun-fill';
        }
        // Language
        document.getElementById('langToggle').addEventListener('click', () => i18n.toggle());
        i18n.init();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
