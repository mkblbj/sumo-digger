{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Left: task list -->
    <div class="col-md-3">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-list-task"></i> <span data-i18n="results.taskList">任务列表</span></span>
                <button class="btn btn-sm btn-outline-secondary" id="refreshTasksBtn" title="刷新">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
            </div>
            <div class="list-group list-group-flush" id="taskList" style="max-height: 60vh; overflow-y: auto;">
                <div class="text-center py-3 text-muted" id="taskListLoading">
                    <span class="spinner-border spinner-border-sm"></span>
                </div>
            </div>
            <!-- Pagination -->
            <div class="card-footer py-1 d-flex justify-content-between align-items-center" id="taskPagination">
                <button class="btn btn-sm btn-outline-secondary" id="prevPageBtn" disabled>
                    <i class="bi bi-chevron-left"></i>
                </button>
                <small class="text-muted" id="pageInfo">-</small>
                <button class="btn btn-sm btn-outline-secondary" id="nextPageBtn" disabled>
                    <i class="bi bi-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Right: property view -->
    <div class="col-md-9">
        <div id="noSelection" class="text-center text-muted py-5">
            <i class="bi bi-arrow-left" style="font-size: 2rem;"></i>
            <p class="mt-2" data-i18n="results.noSelection">从左侧选择一个任务查看</p>
        </div>

        <!-- Task running indicator -->
        <div id="taskRunningView" class="d-none">
            <div class="card">
                <div class="card-body text-center py-4">
                    <div class="spinner-border text-primary mb-3" role="status"></div>
                    <h5 id="runningTitle" data-i18n="results.taskRunning">任务运行中...</h5>
                    <div class="progress mt-3 mx-auto" style="max-width: 400px; height: 24px;">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" id="runningProgressBar" style="width: 0%;">0%</div>
                    </div>
                    <p class="text-muted small mt-2" id="runningDetail"></p>
                    <p class="text-muted small" id="runningPartialInfo"></p>
                </div>
            </div>
        </div>

        <!-- Property view (completed tasks) -->
        <div id="propertyView" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 id="taskTitle" class="mb-0"></h5>
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-primary" id="exportExcel" title="Excel">
                        <i class="bi bi-file-earmark-spreadsheet"></i> Excel
                    </button>
                    <button class="btn btn-outline-primary" id="exportCsv" title="CSV">
                        <i class="bi bi-filetype-csv"></i> CSV
                    </button>
                    <button class="btn btn-outline-primary" id="exportJson" title="JSON">
                        <i class="bi bi-filetype-json"></i> JSON
                    </button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-hover table-sm" id="propertyTable">
                    <thead class="table-light">
                        <tr>
                            <th data-i18n="results.col.index">#</th>
                            <th data-i18n="results.col.name">物件名</th>
                            <th data-i18n="results.col.price">租金 / 价格</th>
                            <th data-i18n="results.col.layout">户型</th>
                            <th data-i18n="results.col.area">面积</th>
                            <th data-i18n="results.col.access">交通</th>
                            <th data-i18n="results.col.action">操作</th>
                        </tr>
                    </thead>
                    <tbody id="propertyTableBody"></tbody>
                </table>
            </div>
            <!-- Property pagination -->
            <div class="d-flex justify-content-between align-items-center mt-2" id="propertyPagination">
                <div class="d-flex align-items-center gap-2">
                    <small class="text-muted" data-i18n="results.perPage">每页</small>
                    <select class="form-select form-select-sm" id="propPerPageSelect" style="width:auto;">
                        <option value="20" selected>20</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                        <option value="200">200</option>
                    </select>
                    <small class="text-muted" data-i18n="results.items">条</small>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <button class="btn btn-sm btn-outline-secondary" id="propPrevBtn" disabled>
                        <i class="bi bi-chevron-left"></i>
                    </button>
                    <small class="text-muted" id="propPageInfo">-</small>
                    <button class="btn btn-sm btn-outline-secondary" id="propNextBtn" disabled>
                        <i class="bi bi-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Property detail modal -->
<div class="modal fade" id="propertyModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-info" id="modalTranslateBtn" title="翻译">
                    <i class="bi bi-translate"></i> <span data-i18n="results.translateBtn">翻译</span>
                </button>
                <button type="button" class="btn btn-outline-primary" id="modalCopyBtn">
                    <i class="bi bi-clipboard"></i> <span data-i18n="results.copy">复制</span>
                </button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"><span data-i18n="results.close">关闭</span></button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/currency.js') }}"></script>
<script src="{{ url_for('static', filename='js/bilingual.js') }}"></script>
<script>
    let selectedTaskId = null;
    let currentProperties = [];
    let allTasks = [];
    let autoRefreshTimer = null;
    let currentPage = 1;
    let totalPages = 1;

    // Property pagination state
    let propPage = 1;
    let propPerPage = 20;
    let propTotalPages = 1;

    /** Format m2 → m² (superscript) */
    function fmtArea(text) {
        if (!text) return '-';
        return text.replace(/m2/gi, 'm²').replace(/㎡/g, 'm²');
    }

    // ── Task list ──
    async function loadTasks(page) {
        if (page !== undefined) currentPage = page;
        try {
            const res = await fetch(`/api/tasks?page=${currentPage}&per_page=10`);
            const data = await res.json();
            allTasks = data.tasks;
            totalPages = data.total_pages;
            renderTaskList();
            renderPagination(data);
            scheduleAutoRefresh();
        } catch (e) {
            console.error('Failed to load tasks:', e);
        }
    }

    function renderPagination(data) {
        const prev = document.getElementById('prevPageBtn');
        const next = document.getElementById('nextPageBtn');
        const info = document.getElementById('pageInfo');

        prev.disabled = currentPage <= 1;
        next.disabled = currentPage >= totalPages;
        info.textContent = data.total > 0 ? `${currentPage} / ${totalPages}  (${data.total}${i18n.t('results.items')})` : i18n.t('results.noTasks');
    }

    document.getElementById('prevPageBtn').addEventListener('click', () => {
        if (currentPage > 1) loadTasks(currentPage - 1);
    });
    document.getElementById('nextPageBtn').addEventListener('click', () => {
        if (currentPage < totalPages) loadTasks(currentPage + 1);
    });

    function renderTaskList() {
        const list = document.getElementById('taskList');
        const loading = document.getElementById('taskListLoading');
        if (loading) loading.remove();

        if (allTasks.length === 0) {
            list.innerHTML = `<div class="text-center py-3 text-muted small">${i18n.t('results.noTasks')}</div>`;
            return;
        }

        list.innerHTML = allTasks.map(t => {
            const date = new Date(t.created_at);
            const timeStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const isRunning = ['running', 'pending', 'collecting'].includes(t.status);
            const isSelected = t.id === selectedTaskId;

            let badge = '';
            if (t.status === 'completed') {
                badge = `<span class="badge bg-success">${i18n.t('results.completed')}</span>`;
            } else if (isRunning) {
                badge = `<span class="badge bg-primary"><span class="spinner-border spinner-border-sm" style="width:.6rem;height:.6rem;"></span> ${i18n.t('results.running')}</span>`;
            } else if (t.status === 'failed') {
                badge = `<span class="badge bg-danger">${i18n.t('results.failed')}</span>`;
            } else {
                badge = `<span class="badge bg-secondary">${t.status}</span>`;
            }

            const typeLabel = t.property_type === 'search' ? '<i class="bi bi-geo-alt text-info"></i>' :
                              t.property_type === 'buy' ? '<i class="bi bi-house text-warning"></i>' :
                              t.property_type === 'blueprint' ? '<i class="bi bi-file-earmark-pdf text-danger"></i>' :
                              '<i class="bi bi-link-45deg text-muted"></i>';

            let progressHtml = '';
            if (isRunning && t.total > 0) {
                const pct = Math.round((t.progress || 0) / t.total * 100);
                progressHtml = `<div class="progress mt-1" style="height: 4px;"><div class="progress-bar" style="width: ${pct}%;"></div></div>`;
            } else if (isRunning) {
                progressHtml = `<div class="progress mt-1" style="height: 4px;"><div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%;"></div></div>`;
            }

            return `
                <div class="list-group-item list-group-item-action task-item ${isSelected ? 'active' : ''}" data-task-id="${t.id}" role="button">
                    <div class="d-flex justify-content-between align-items-start">
                        <div class="flex-grow-1 me-1">
                            <div class="d-flex align-items-center gap-1">
                                ${typeLabel}
                                <small class="${isSelected ? 'text-white' : 'text-muted'}">${timeStr}</small>
                                ${badge}
                            </div>
                            <div class="small fw-medium">${t.result_count}${t.total ? ' / ' + t.total : ''} ${i18n.t('results.property')}</div>
                            ${progressHtml}
                        </div>
                        <button class="btn btn-sm ${isSelected ? 'btn-outline-light' : 'btn-outline-danger'} delete-task-btn py-0 px-1" data-task-id="${t.id}" title="${i18n.t('results.delete')}" onclick="event.stopPropagation();">
                            <i class="bi bi-trash3" style="font-size:.7rem;"></i>
                        </button>
                    </div>
                </div>
            `;
        }).join('');

        // Click handlers
        list.querySelectorAll('.task-item').forEach(el => {
            el.addEventListener('click', () => {
                list.querySelectorAll('.task-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
                selectTask(el.dataset.taskId);
            });
        });

        // Delete handlers
        list.querySelectorAll('.delete-task-btn').forEach(el => {
            el.addEventListener('click', async () => {
                const taskId = el.dataset.taskId;
                if (!confirm(i18n.t('results.deleteConfirm'))) return;
                try {
                    await fetch(`/api/tasks/${taskId}`, { method: 'DELETE' });
                    if (selectedTaskId === taskId) { selectedTaskId = null; hideAllViews(); }
                    await loadTasks();
                } catch (e) { console.error(e); }
            });
        });
    }

    function scheduleAutoRefresh() {
        if (autoRefreshTimer) clearInterval(autoRefreshTimer);
        const hasRunning = allTasks.some(t => ['running', 'pending', 'collecting'].includes(t.status));
        if (hasRunning) {
            autoRefreshTimer = setInterval(async () => {
                await loadTasks();
                if (selectedTaskId) {
                    const task = allTasks.find(t => t.id === selectedTaskId);
                    if (task && ['running', 'pending', 'collecting'].includes(task.status)) {
                        showRunningTask(task);
                    } else if (task && task.status === 'completed') {
                        loadProperties(selectedTaskId);
                    }
                }
            }, 3000);
        }
    }

    function selectTask(taskId) {
        selectedTaskId = taskId;
        propPage = 1; // Reset to first page on task switch
        const task = allTasks.find(t => t.id === taskId);
        if (!task) return;
        if (['running', 'pending', 'collecting'].includes(task.status)) showRunningTask(task);
        else loadProperties(taskId);
    }

    function hideAllViews() {
        document.getElementById('noSelection').classList.remove('d-none');
        document.getElementById('propertyView').classList.add('d-none');
        document.getElementById('taskRunningView').classList.add('d-none');
    }

    function showRunningTask(task) {
        document.getElementById('noSelection').classList.add('d-none');
        document.getElementById('propertyView').classList.add('d-none');
        document.getElementById('taskRunningView').classList.remove('d-none');

        const pct = task.total > 0 ? Math.round((task.progress || 0) / task.total * 100) : 0;
        const bar = document.getElementById('runningProgressBar');
        bar.style.width = `${pct}%`;
        bar.textContent = task.total > 0 ? `${pct}%` : '';
        document.getElementById('runningTitle').textContent =
            task.phase === 'collecting' ? i18n.t('results.collectingUrls') : i18n.t('results.scraping', { current: task.progress || 0, total: task.total });
        document.getElementById('runningDetail').textContent =
            task.current_url ? (task.current_url.length > 60 ? task.current_url.substring(0, 60) + '...' : task.current_url) : '';
        document.getElementById('runningPartialInfo').textContent =
            task.result_count > 0 ? i18n.t('results.gotData', { count: task.result_count }) : '';
    }

    // ── Load properties (with pagination) ──
    async function loadProperties(taskId) {
        selectedTaskId = taskId;
        document.getElementById('noSelection').classList.add('d-none');
        document.getElementById('taskRunningView').classList.add('d-none');
        document.getElementById('propertyView').classList.remove('d-none');

        try {
            const res = await fetch(`/api/properties/${taskId}/sectioned?page=${propPage}&per_page=${propPerPage}`);
            const data = await res.json();
            currentProperties = data.properties;
            propTotalPages = data.total_pages || 1;
            propPage = data.page || 1;

            const task = data.task;
            const date = new Date(task.created_at);
            document.getElementById('taskTitle').textContent =
                `${data.total} ${i18n.t('results.property')} - ${date.toLocaleDateString()} ${date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;

            const rowOffset = (propPage - 1) * propPerPage;

            const tbody = document.getElementById('propertyTableBody');
            tbody.innerHTML = currentProperties.map((p, i) => {
                const name = getFieldValue(p, ['detail.building_name'], ['物件名'], true) || p._meta?.url || '-';
                const rent = getFieldValue(p, ['rent.rent', 'basic.price_jpy', 'analysis.property_price'], ['房租', '售价（日元）', '物件价格'], true) || '-';
                const layout = getFieldValue(p, ['basic.layout_cn'], ['户型'], true) || '-';
                const area = fmtArea(String(getFieldValue(p, ['basic.area', 'detail.exclusive_area', 'basic.land_area', 'basic.building_area'], ['面积', '专有面积', '土地面积', '建筑面积'], true) || '-'));
                const accessRaw = getFieldValue(p, ['detail.access'], ['交通'], true);
                const access = Array.isArray(accessRaw) ? accessRaw[0] || '-' : String(accessRaw || '-');
                const imageUrls = p._meta?.image_urls || [];
                const hasImages = imageUrls.length > 0;
                const isBlueprint = (p._meta?.url || '').startsWith('blueprint://');
                const thumbUrl = hasImages ? (isBlueprint || imageUrls[0].startsWith('/') ? imageUrls[0] : `/api/image/proxy?url=${encodeURIComponent(imageUrls[0])}`) : '';
                return `
                    <tr>
                        <td>${rowOffset + i + 1}</td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                ${hasImages ? `<img src="${thumbUrl}" style="height:32px;width:32px;object-fit:cover;border-radius:4px;" onerror="this.style.display='none'" loading="lazy">` : ''}
                                <a href="#" class="prop-detail" data-idx="${i}">${String(name).substring(0, 20)}</a>
                            </div>
                        </td>
                        <td class="jpy-amount">${rent}</td>
                        <td>${layout}</td>
                        <td>${area}</td>
                        <td>${String(access).substring(0, 25)}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-secondary copy-btn" data-idx="${i}" title="${i18n.t('results.copy')}">
                                <i class="bi bi-clipboard"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');

            if (typeof CurrencyService !== 'undefined') {
                await CurrencyService.init();
                document.querySelectorAll('.jpy-amount').forEach(el => {
                    el.textContent = CurrencyService.format(el.textContent);
                });
            }

            tbody.querySelectorAll('.prop-detail').forEach(el => {
                el.addEventListener('click', (e) => { e.preventDefault(); showPropertyDetail(parseInt(el.dataset.idx)); });
            });
            tbody.querySelectorAll('.copy-btn').forEach(el => {
                el.addEventListener('click', () => copyProperty(parseInt(el.dataset.idx)));
            });

            // Update property pagination
            renderPropPagination(data);
        } catch (e) {
            console.error('Failed to load properties:', e);
        }
    }

    function renderPropPagination(data) {
        const prev = document.getElementById('propPrevBtn');
        const next = document.getElementById('propNextBtn');
        const info = document.getElementById('propPageInfo');

        prev.disabled = propPage <= 1;
        next.disabled = propPage >= propTotalPages;
        info.textContent = data.total > 0
            ? `${propPage} / ${propTotalPages}  (${data.total}${i18n.t('results.items')})`
            : '-';
    }

    /** 按 dot-key 查找字段（同 key 在 schema 中多次出现时取第一次出现） */
    function findFieldByKey(sectionedProperty, key) {
        const sections = sectionedProperty?.sections || [];
        for (const section of sections) {
            for (const field of section.fields || []) {
                if (field.key === key) return field;
            }
        }
        return null;
    }

    function findFieldByLabel(sectionedProperty, label) {
        const sections = sectionedProperty?.sections || [];
        for (const section of sections) {
            for (const field of section.fields || []) {
                if (field.label === label) return field;
            }
        }
        return null;
    }

    function resolveFieldValue(field, preferTranslated) {
        if (!field) return null;
        const translatedValue = field.translated_value;
        if (preferTranslated && translatedValue !== undefined && translatedValue !== null && translatedValue !== '') {
            return translatedValue;
        }
        if (field.value !== undefined && field.value !== null && field.value !== '') {
            return field.value;
        }
        if (translatedValue !== undefined && translatedValue !== null && translatedValue !== '') {
            return translatedValue;
        }
        return null;
    }

    /**
     * 按 keys / labels 数组顺序优先取值，并跳过空字段。
     * 修复：租房 schema 中 basic.price_jpy 排在 rent.rent 之前，若按章节扫描会先命中空的「售价」导致顶部卡片租金错误。
     */
    function getFieldValue(sectionedProperty, keys = [], labels = [], preferTranslated = false) {
        for (const k of keys) {
            const field = findFieldByKey(sectionedProperty, k);
            const v = resolveFieldValue(field, preferTranslated);
            if (v !== null && v !== undefined && v !== '') return v;
        }
        for (const lbl of labels) {
            const field = findFieldByLabel(sectionedProperty, lbl);
            const v = resolveFieldValue(field, preferTranslated);
            if (v !== null && v !== undefined && v !== '') return v;
        }
        return null;
    }

    function formatPriceValue(text) {
        if (!text || text === '-') return text || '-';
        if (typeof CurrencyService === 'undefined' || !CurrencyService.rate) {
            return escapeHtml(String(text));
        }
        return CurrencyService.format(String(text));
    }

    function formatDisplayValue(rawValue, field) {
        const key = field?.key || '';
        const label = field?.label || '';
        if (rawValue === null || rawValue === undefined || rawValue === '') return '-';

        if (Array.isArray(rawValue)) {
            if (rawValue.length === 0) return '-';
            if (rawValue.every(item => typeof item === 'string' || typeof item === 'number')) {
                return escapeHtml(rawValue.join(' / '));
            }
            return rawValue.map(item => {
                if (typeof item === 'object' && item !== null) {
                    return escapeHtml(Object.values(item).filter(Boolean).join(' '));
                }
                return escapeHtml(String(item));
            }).join('<br>');
        }

        if (typeof rawValue === 'object') {
            return Object.entries(rawValue)
                .map(([k, v]) => `${escapeHtml(k)}：${escapeHtml(String(v ?? '-'))}`)
                .join('<br>');
        }

        if (/price|rent|fee|tax|cost|spend|jpy|房租|租金|售价|押金|礼金|中介费|管理费|修缮费|税/.test(key + label)) {
            return formatPriceValue(String(rawValue));
        }
        if (/area|面积|㎡|m2/i.test(key + label)) {
            return fmtArea(String(rawValue));
        }
        return escapeHtml(String(rawValue));
    }

    function formatFieldValue(field) {
        const value = field?.value;
        const translatedValue = field?.translated_value;
        const primaryValue = translatedValue !== undefined && translatedValue !== null && translatedValue !== ''
            ? translatedValue
            : value;
        const secondaryValue = translatedValue !== undefined && translatedValue !== null && translatedValue !== '' && String(translatedValue) !== String(value)
            ? value
            : null;

        if (primaryValue === null || primaryValue === undefined || primaryValue === '') return '-';

        let formatted = `<span class="field-primary">${formatDisplayValue(primaryValue, field)}</span>`;
        if (secondaryValue !== null && secondaryValue !== undefined && secondaryValue !== '') {
            formatted += `<div class="mt-1"><small class="text-muted d-inline-block border rounded px-2 py-1 original-text-toggle" role="button" tabindex="0" title="点击显示/隐藏日文原文">原文</small></div>`;
            formatted += `<div class="original-text mt-1 d-none"><small class="text-muted">${formatDisplayValue(secondaryValue, field)}</small></div>`;
        }
        return formatted;
    }

    function buildSectionTables(sectionedProperty) {
        return (sectionedProperty.sections || []).map(section => {
            const rows = (section.fields || [])
                .filter(field => field && field.label && field.label !== '图片' && field.label !== '视频' && field.label !== 'Vr链接')
                .map(field => `<tr><th class="text-nowrap bg-light copy-cell" style="width:160px;">${escapeHtml(field.label)}</th><td class="copy-cell">${formatFieldValue(field)}</td></tr>`)
                .join('');
            if (!rows) return '';
            return `<div class="mb-3"><h6 class="border-bottom pb-1 mb-2">${escapeHtml(section.name)}</h6><table class="table table-sm table-bordered mb-0">${rows}</table></div>`;
        }).join('');
    }

    // ── Bilingual display helpers ──
    const NO_TRANSLATE_DISPLAY = new Set([
        '物件名',
        '所在地', '住所',
        'アクセス1', 'アクセス2', 'アクセス3',
        '最寄り駅1', '最寄り駅2', '最寄り駅3',
        '駅徒歩',
        '賃料', '賃料・初期費用', '管理費・共益費', '敷金', '礼金', '保証金', '敷引・償却',
        '販売価格', '価格',
        '専有面積', '土地面積', '建物面積',
        '築年月', '築年数', '間取り', '階', '階建', '向き',
        'URL',
    ]);

    function appendTranslation(key, formattedHtml, rawOriginal, translatedData) {
        if (!translatedData) return formattedHtml;
        if (NO_TRANSLATE_DISPLAY.has(key)) return formattedHtml;
        const tv = translatedData[key];
        if (!tv) return formattedHtml;
        if (String(tv) === String(rawOriginal)) return formattedHtml;
        return `${formattedHtml}<br><small class="text-success">${escapeHtml(String(tv))}</small>`;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ── Property detail modal ──
    function renderModal(p, idx) {
        const body = document.getElementById('modalBody');
        const meta = p._meta || {};
        const imageUrls = meta.image_urls || [];
        const isBlueprint = (meta.url || '').startsWith('blueprint://');
        const escHtml = (t) => { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };
        const fmtPrice = (txt) => {
            if (!txt || txt === '-' || typeof CurrencyService === 'undefined' || !CurrencyService.rate) return txt;
            return CurrencyService.format(txt);
        };

        const imageHtml = imageUrls.length > 0 ? `
            <div class="mb-3">
                <div class="d-flex gap-2 overflow-auto pb-2" style="max-width:100%;">
                    ${imageUrls.slice(0, 20).map((url, i) => {
                        const imgSrc = isBlueprint || url.startsWith('/') ? url : `/api/image/proxy?url=${encodeURIComponent(url)}`;
                        const fullSrc = isBlueprint || url.startsWith('/') ? url : `/api/image/proxy?url=${encodeURIComponent(url)}`;
                        return `<img src="${imgSrc}" class="rounded shadow-sm flex-shrink-0"
                              style="height:150px; cursor:pointer; object-fit:cover;"
                              onclick="window.open('${fullSrc}','_blank')"
                              onerror="this.style.display='none'" title="Image ${i+1}" loading="lazy">`;
                    }).join('')}
                </div>
                ${meta.id && !isBlueprint ? `<a href="/api/image/zip/${meta.id}" class="btn btn-sm btn-outline-success mt-1">
                    <i class="bi bi-download"></i> ${i18n.t('results.downloadImages', { count: imageUrls.length })}
                </a>` : ''}
            </div>
        ` : '';

        const rent = getFieldValue(p, ['rent.rent', 'basic.price_jpy', 'analysis.property_price'], ['房租', '售价（日元）', '物件价格'], true) || '-';
        const layout = getFieldValue(p, ['basic.layout_cn'], ['户型'], true) || '-';
        const area = fmtArea(String(getFieldValue(p, ['basic.area', 'detail.exclusive_area', 'basic.land_area', 'basic.building_area'], ['面积', '专有面积', '土地面积', '建筑面积'], true) || '-'));
        const deposit = getFieldValue(p, ['rent.deposit'], ['押金'], true) || '-';
        const keyMoney = getFieldValue(p, ['rent.key_money'], ['礼金'], true) || '-';
        const location = getFieldValue(p, ['basic.address'], ['地址', '所在地'], true) || '-';
        const accessRaw = getFieldValue(p, ['detail.access'], ['交通'], true);
        const access1 = Array.isArray(accessRaw) ? accessRaw[0] || '-' : String(accessRaw || '-');
        const sectionTables = buildSectionTables(p);

        const keyInfoHtml = `
            <div class="row g-2 mb-3">
                <div class="col-4"><div class="p-2 bg-primary bg-opacity-10 rounded text-center">
                    <small class="text-muted d-block">租金/价格</small>
                    <strong class="text-primary">${fmtPrice(String(rent))}</strong>
                </div></div>
                <div class="col-4"><div class="p-2 bg-light rounded text-center">
                    <small class="text-muted d-block">户型/面积</small>
                    <strong>${escHtml(String(layout))} / ${area}</strong>
                </div></div>
                <div class="col-4"><div class="p-2 bg-light rounded text-center">
                    <small class="text-muted d-block">押金/礼金</small>
                    <strong>${escHtml(String(deposit))} / ${escHtml(String(keyMoney))}</strong>
                </div></div>
            </div>
            <p class="mb-2 small text-muted">
                <i class="bi bi-geo-alt"></i> ${escHtml(String(location))}
                &nbsp;|&nbsp; <i class="bi bi-train-front"></i> ${escHtml(access1)}
            </p>`;

        body.innerHTML = `
            ${imageHtml}
            ${keyInfoHtml}
            <!-- AI Summary section -->
            <div class="mb-3 small text-muted" id="aiPrefetchStatus">
                <span class="spinner-border spinner-border-sm me-1"></span> 正在生成 3 个标题和 3 个描述...
            </div>
            <div class="d-none mb-3" id="aiTitleResult">
                <div class="d-flex align-items-start gap-2">
                    <div class="flex-grow-1 bg-warning bg-opacity-10 rounded p-2">
                        <small class="text-muted d-block mb-1"><i class="bi bi-lightbulb"></i> AI 标题</small>
                        <div id="aiTitleText" class="user-select-all" style="cursor:pointer;"></div>
                    </div>
                    <button class="btn btn-sm btn-outline-secondary flex-shrink-0 ai-copy-btn" data-target="aiTitleText" title="复制">
                        <i class="bi bi-clipboard"></i>
                    </button>
                </div>
            </div>
            <div class="d-none mb-3" id="aiSummaryResult">
                <div class="d-flex align-items-start gap-2">
                    <div class="flex-grow-1 bg-warning bg-opacity-10 rounded p-2">
                        <small class="text-muted d-block mb-1"><i class="bi bi-file-text"></i> AI 简介</small>
                        <div id="aiSummaryText" class="user-select-all" style="cursor:pointer;"></div>
                    </div>
                    <button class="btn btn-sm btn-outline-secondary flex-shrink-0 ai-copy-btn" data-target="aiSummaryText" title="复制">
                        <i class="bi bi-clipboard"></i>
                    </button>
                </div>
            </div>
            <div class="d-none alert alert-info py-1 px-2 mb-2 small" id="modalTranslateStatus">
                <span class="spinner-border spinner-border-sm me-1"></span> ${i18n.t('results.translating')}
            </div>
            <h6 class="border-bottom pb-1 mb-2"><i class="bi bi-list-ul"></i> ${i18n.t('results.overview')}</h6>
            ${sectionTables}
            ${!isBlueprint ? `<a href="${escHtml(meta.url || '#')}" target="_blank" class="btn btn-sm btn-outline-primary">
                <i class="bi bi-box-arrow-up-right"></i> ${i18n.t('results.viewOnSuumo')}
            </a>` : ''}
        `;
        document.getElementById('modalCopyBtn').onclick = () => copyProperty(idx);

        body.querySelectorAll('.ai-copy-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const text = document.getElementById(btn.dataset.target)?.textContent;
                if (text) { copyToClipboard(text).then(() => showCopyToast(text)); }
            });
        });

        body.querySelectorAll('.original-text-toggle').forEach(toggle => {
            toggle.addEventListener('click', () => {
                const original = toggle.parentElement?.nextElementSibling;
                if (original) original.classList.toggle('d-none');
            });
            toggle.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    const original = toggle.parentElement?.nextElementSibling;
                    if (original) original.classList.toggle('d-none');
                }
            });
        });
    }

    /**
     * Open property detail modal.
     * If no real translation exists, call single-property translate API synchronously.
     */
    function renderAiItems(targetId, textId, items) {
        const safeItems = (Array.isArray(items) ? items : []).filter(Boolean).slice(0, 3);
        const target = document.getElementById(targetId);
        const textEl = document.getElementById(textId);
        if (!target || !textEl) return;
        target.classList.toggle('d-none', safeItems.length === 0);
        textEl.innerHTML = safeItems
            .map((item, idx) => `<div class="mb-2 p-2 border rounded bg-white"><strong>${idx + 1}.</strong> ${escapeHtml(String(item))}</div>`)
            .join('');
    }

    async function preloadDetailAssets(propertyId, idx) {
        const statusEl = document.getElementById('aiPrefetchStatus');
        try {
            const res = await fetch(`/api/property/${propertyId}/detail-assets`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ force_translate: false }),
            });
            const data = await res.json();
            if (!data.ok) throw new Error(data.error || 'Failed to preload detail assets');
            if (data.property) currentProperties[idx] = data.property;
            renderModal(currentProperties[idx], idx);
            renderAiItems('aiTitleResult', 'aiTitleText', data.title_items || []);
            renderAiItems('aiSummaryResult', 'aiSummaryText', data.summary_items || []);
            const doneStatus = document.getElementById('aiPrefetchStatus');
            if (doneStatus) doneStatus.classList.add('d-none');
        } catch (e) {
            console.error('Detail preload error:', e);
            if (statusEl) {
                statusEl.classList.remove('text-muted');
                statusEl.classList.add('text-danger');
                statusEl.innerHTML = '<i class="bi bi-exclamation-triangle me-1"></i> 标题和描述自动生成失败，请稍后重试';
            }
        }
    }

    async function showPropertyDetail(idx) {
        const p = currentProperties[idx];
        if (!p) return;

        document.getElementById('modalTitle').textContent = getFieldValue(p, ['detail.building_name'], ['物件名'], true) || 'Detail';

        renderModal(p, idx);
        const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('propertyModal'));
        modal.show();

        if (p._meta?.id) {
            preloadDetailAssets(p._meta.id, idx);
        }
    }

    function copyProperty(idx) {
        const p = currentProperties[idx];
        if (!p) return;
        const text = (p.sections || []).flatMap(section => {
            const header = `【${section.name}】`;
            const rows = (section.fields || []).map(field => `${field.label}: ${Array.isArray(field.value) ? field.value.join(' / ') : (field.value ?? '-')}`);
            return [header, ...rows];
        }).join('\n');
        copyToClipboard(text).then(() => {
            showCopyToast(getFieldValue(p, ['detail.building_name'], ['物件名'], true) || 'Property');
            const btn = document.querySelector(`.copy-btn[data-idx="${idx}"]`);
            if (btn) { const o = btn.innerHTML; btn.innerHTML = '<i class="bi bi-check"></i>'; setTimeout(() => btn.innerHTML = o, 1000); }
        });
    }

    ['Excel', 'Csv', 'Json'].forEach(fmt => {
        document.getElementById(`export${fmt}`).addEventListener('click', () => {
            if (selectedTaskId) window.location.href = `/api/download/${selectedTaskId}/${fmt.toLowerCase()}`;
        });
    });

    document.getElementById('refreshTasksBtn').addEventListener('click', () => loadTasks());

    // ── Modal translate button: re-translate current property ──
    document.getElementById('modalTranslateBtn').addEventListener('click', async () => {
        const modalTitle = document.getElementById('modalTitle').textContent;
        const idx = currentProperties.findIndex(p => (getFieldValue(p, ['detail.building_name'], ['物件名'], true) || 'Detail') === modalTitle);
        if (idx < 0 || !currentProperties[idx]?._meta?.id) return;

        const btn = document.getElementById('modalTranslateBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>' + i18n.t('results.translating');

        try {
            const res = await fetch(`/api/translate/property/${currentProperties[idx]._meta.id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ force: true }),
            });
            const data = await res.json();
            if (data.ok && data.property) {
                await loadProperties(selectedTaskId);
                const refreshedIdx = currentProperties.findIndex(p => (getFieldValue(p, ['detail.building_name'], ['物件名'], true) || 'Detail') === modalTitle);
                if (refreshedIdx >= 0) {
                    renderModal(currentProperties[refreshedIdx], refreshedIdx);
                }
            } else {
                alert(data.error || 'Translation failed');
            }
        } catch (e) {
            console.error('[translate] Error:', e);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-translate"></i> ' + i18n.t('results.translateBtn');
        }
    });

    // ── Property pagination controls ──
    document.getElementById('propPerPageSelect').addEventListener('change', (e) => {
        propPerPage = parseInt(e.target.value);
        propPage = 1;
        if (selectedTaskId) loadProperties(selectedTaskId);
    });
    document.getElementById('propPrevBtn').addEventListener('click', () => {
        if (propPage > 1) { propPage--; if (selectedTaskId) loadProperties(selectedTaskId); }
    });
    document.getElementById('propNextBtn').addEventListener('click', () => {
        if (propPage < propTotalPages) { propPage++; if (selectedTaskId) loadProperties(selectedTaskId); }
    });

    // ── Re-render on language change ──
    i18n.onChange(() => {
        renderTaskList();
        if (selectedTaskId) {
            const task = allTasks.find(t => t.id === selectedTaskId);
            if (task && task.status === 'completed') loadProperties(selectedTaskId);
        }
    });

    // ── Init ──
    loadTasks().then(() => {
        const params = new URLSearchParams(window.location.search);
        const taskId = params.get('task');
        if (taskId) {
            selectedTaskId = taskId;
            // Find which page this task is on — it might be page 1 if recent
            const task = allTasks.find(t => t.id === taskId);
            if (task) selectTask(taskId);
            renderTaskList();
        }
    });
</script>
{% endblock %}
